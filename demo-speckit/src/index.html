<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Photo Albums</title>
  <link rel="stylesheet" href="./css/base.css" />
  <link rel="stylesheet" href="./css/main-page.css" />
</head>
<body>
  <header class="app-header">
    <h1>My Photo Albums</h1>
    <button id="btn-new-album" class="btn-primary">+ New Album</button>
  </header>

  <div id="new-album-form" class="album-form hidden">
    <input type="text" id="input-album-name" placeholder="Album name" maxlength="255" />
    <input type="date" id="input-album-date" />
    <button id="btn-album-confirm" class="btn-primary">Create</button>
    <button id="btn-album-cancel" class="btn-secondary">Cancel</button>
  </div>

  <main>
    <div id="empty-state" class="empty-state hidden">
      <p>No albums yet. Create your first album to get started.</p>
    </div>
    <div id="album-grid" class="album-grid"></div>
  </main>

  <div id="error-banner" class="error-banner hidden"></div>

  <script type="module" src="./js/main-page.js"></script>
</body>
</html>
